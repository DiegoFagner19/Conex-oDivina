            border: 1px solid #2a3a31;

            color: #1a3a2e;
        }

            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;

            margin: 1rem 0;
            padding: 1.2rem;

            box-shadow: 0 10px 20px rgba(0,0,0,0.05);

            color: #2c6e4e;
            font-size: 1.1rem;

        .reading-guide-item {

            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reading-guide-item.completed {
            background: #d4e8df;
            text-decoration: line-through;

            background: #d0dfd8;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

            background: #2c6e4e;

            font-weight: bold;

            left: 50%;

            font-size: 0.8rem;

            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }

            position: fixed;
            top: -9999px;
            left: -9999px;
        }

        .langs-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;

            .nav-item span:last-child { font-size: 0.55rem; }

            .toast-msg { white-space: normal; width: 80%; text-align: center; }
            .lang-btn { padding: 5px 10px; font-size: 0.65rem; }
        }
    </style>
</head>

        he: { bible: "התנ״ך", guide: "מדריך", videos: "מחקרים", dictionary: "מילון", audio: "שמע", languages: "שפות", chapter: "פרק", previous: "קודם", next: "הבא", readingPlan: "תוכנית קריאה", dailyReading: "קריאה יומית", bookmark: "🔖 סימניה", goToBookmark: "📍 עבור אל", bookmarkSaved: "הסימניה נשמרה!", search: "חפש", verseOfDay: "✨ פסוק היום", messageOfDay: "📖 מסר היום", listen: "🎧 האזן", share: "🖼️ שתף", new: "🔄 חדש" },
        el: { bible: "Αγία Γραφή", guide: "Οδηγός", videos: "Μελέτες", dictionary: "Λεξικό", audio: "Ήχος", languages: "Γλώσσες", chapter: "Κεφ", previous: "Προηγ", next: "Επόμ", readingPlan: "Πλάνο Ανάγνωσης", dailyReading: "Καθημερινή Ανάγνωση", bookmark: "🔖 Σελιδοδείκτης", goToBookmark: "📍 Μετάβαση", bookmarkSaved: "Ο σελιδοδείκτης αποθηκεύτηκε!", search: "Αναζήτηση", verseOfDay: "✨ Στίχος της Ημέρας", messageOfDay: "📖 Μήνυμα της Ημέρας", listen: "🎧 Ακούστε", share: "🖼️ Κοινοποίηση", new: "🔄 Νέο" },
        sw: { bible: "Biblia", guide: "Mwongozo", videos: "Masomo", dictionary: "Kamusi", audio: "Sauti", languages: "Lugha", chapter: "Sura", previous: "Iliyotangulia", next: "Inayofuata", readingPlan: "Mpango wa Kusoma", dailyReading: "Usomaji wa Kila Siku", bookmark: "🔖 Alama", goToBookmark: "📍 Nenda kwa", bookmarkSaved: "Alama imehifadhiwa!", search: "Tafuta", verseOfDay: "✨ Aya ya Siku", messageOfDay: "📖 Ujumbe wa Siku", listen: "🎧 Sikiliza", share: "🖼️ Shiriki", new: "🔄 Mpya" }
    };

    let currentLang = 'pt';
    let currentBook = "João";
    let currentChapter = 1;
    let isNightMode = false;
    let currentDay = 1;

    function t(key) { return translations[currentLang][key] || translations.pt[key]; }

    function updateUILanguage() {
        document.getElementById('verseTitle').innerHTML = t('verseOfDay');
        document.getElementById('messageTitle').innerHTML = t('messageOfDay');
        document.getElementById('listenVerseBtn').innerHTML = t('listen');
        document.getElementById('shareImageBtn').innerHTML = t('share');
        document.getElementById('newVerseBtn').innerHTML = t('new');
        document.getElementById('navBible').innerText = t('bible');
        document.getElementById('navGuide').innerText = t('guide');
        document.getElementById('navVideos').innerText = t('videos');
        document.getElementById('navDict').innerText = t('dictionary');
        document.getElementById('navAudio').innerText = t('audio');
        document.getElementById('navLang').innerText = t('languages');
    }

    function getCurrentDayOfYear() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        return Math.floor((now - start) / 86400000);
    }

    function updateDailyContent() {
        currentDay = getCurrentDayOfYear();
        document.getElementById('dayCounter').innerHTML = `📅 Dia ${currentDay} de 365`;
        document.getElementById('dailyMessageText').innerHTML = dailyMessages[(currentDay - 1) % 365];
        const verse = dailyVersesList[(currentDay - 1) % 365];
        document.getElementById('dailyVerseText').innerHTML = `"${verse.text}"`;
        document.getElementById('dailyVerseRef').innerText = verse.ref;
    }

    // ======================== LEITOR BÍBLICO ========================
    function saveBookmark() {
        localStorage.setItem('bookmarkBook', currentBook);
        localStorage.setItem('bookmarkChapter', currentChapter);
        showToast(t('bookmarkSaved'));
    }

    function goToBookmark() {
        const savedBook = localStorage.getItem('bookmarkBook');
        const savedChapter = localStorage.getItem('bookmarkChapter');
        if (savedBook && savedChapter) {
            currentBook = savedBook;
            currentChapter = parseInt(savedChapter);
            updateChapterSelect();
            loadBibleChapter();
            showToast(`📍 ${currentBook} ${currentChapter}`);
        } else {
            showToast("Nenhum marcador salvo");
        }
    }

    function loadBibleChapter() {
        const container = document.getElementById('bibleContent');
        if (!container) return;
        const chapterData = bibleData[currentBook]?.[currentChapter] || [];
        let html = `<h3>${currentBook} ${currentChapter}</h3>`;
        chapterData.forEach(verse => {
            const parts = verse.split(' ');
            const num = parts[0];
            const text = parts.slice(1).join(' ');
            html += `<p><span class="verse-number">${num}</span> ${text}</p>`;
        });
        if (chapterData.length === 0) html += `<p>📖 "Toda Escritura é inspirada por Deus" (2 Timóteo 3:16)</p>`;
        container.innerHTML = html;
        saveProgress();
    }

    function saveProgress() {
        localStorage.setItem('lastBook', currentBook);
        localStorage.setItem('lastChapter', currentChapter);
    }

    function loadProgress() {
        const savedBook = localStorage.getItem('lastBook');
        const savedChapter = localStorage.getItem('lastChapter');
        if (savedBook && booksOfBible.includes(savedBook)) currentBook = savedBook;
        if (savedChapter) currentChapter = parseInt(savedChapter);
    }

    function changeBook() {
        const select = document.getElementById('bookSelect');
        if (select) currentBook = select.value;
        currentChapter = 1;
        updateChapterSelect();
        loadBibleChapter();
        saveProgress();
    }

    function updateChapterSelect() {
        const chapterSelect = document.getElementById('chapterSelect');
        if (!chapterSelect) return;
        const maxChapters = Object.keys(bibleData[currentBook] || {}).length || 30;
        chapterSelect.innerHTML = '';
        for (let i = 1; i <= maxChapters; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `${t('chapter')} ${i}`;
            if (i === currentChapter) option.selected = true;
            chapterSelect.appendChild(option);
        }
    }

    function changeChapter() {
        const select = document.getElementById('chapterSelect');
        if (select) currentChapter = parseInt(select.value);
        loadBibleChapter();
        saveProgress();
    }

    function prevChapter() {
        if (currentChapter > 1) { currentChapter--; updateChapterSelect(); loadBibleChapter(); saveProgress(); }
    }

    function nextChapter() {
        const maxChapters = Object.keys(bibleData[currentBook] || {}).length || 30;
        if (currentChapter < maxChapters) { currentChapter++; updateChapterSelect(); loadBibleChapter(); saveProgress(); }
    }

    // ======================== ÁUDIO ========================
    function speakText(text, reference) {
        if (!window.speechSynthesis) { showToast("❌ Sem suporte de áudio"); return; }
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(`${reference}. ${text}`);
            const langMap = { pt:'pt-BR', en:'en-US', es:'es-ES', fr:'fr-FR', it:'it-IT', de:'de-DE', ru:'ru-RU', ja:'ja-JP', ko:'ko-KR', zh:'zh-CN' };
            utterance.lang = langMap[currentLang] || 'pt-BR';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
            showToast("🔊 Reproduzindo áudio...");
        }, 100);
    }

    function speakVerseOfDay() {
        const text = document.getElementById('dailyVerseText').innerText.replace(/"/g, '');
        const ref = document.getElementById('dailyVerseRef').innerText;
        speakText(text, ref);
    }

    // ======================== GUIA DE LEITURA ========================
    let readingGuide = [];
    for (let i = 0; i < 365; i++) {
        readingGuide.push({ day: i + 1, book: booksOfBible[i % booksOfBible.length], chapter: (i % 30) + 1, completed: false });
    }

    function loadReadingGuide() {
        const saved = localStorage.getItem('readingGuide');
        if (saved) { try { readingGuide = JSON.parse(saved); } catch(e) {} }
    }
    function saveReadingGuide() { localStorage.setItem('readingGuide', JSON.stringify(readingGuide)); }
    function renderReadingGuide() {
        const container = document.getElementById('guideContent');
        if (!container) return;
        const today = getCurrentDayOfYear();
        let completedCount = readingGuide.filter(g => g.completed).length;
        let progress = (completedCount / 365) * 100;
        let html = `<div class="section-card"><div class="section-title">📅 ${t('readingPlan')}</div><div class="progress-bar"><div class="progress-fill" style="width: ${progress}%;"></div></div><p>📊 ${completedCount} de 365 dias</p>`;
        for (let i = Math.max(0, today - 7); i < Math.min(365, today + 8); i++) {
            const item = readingGuide[i];
            if (!item) continue;
            html += `<div class="reading-guide-item ${item.completed ? 'completed' : ''}" onclick="toggleGuideDay(${i})">
                <strong>${t('dailyReading')} ${item.day}</strong><br>📖 ${item.book} ${item.chapter} ${item.completed ? ' ✓' : ''}
            </div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
    }
    function toggleGuideDay(index) { readingGuide[index].completed = !readingGuide[index].completed; saveReadingGuide(); renderReadingGuide(); showToast(readingGuide[index].completed ? "✅ Concluído!" : "📖 Desmarcado"); }

    // ======================== VÍDEOS ========================
    function renderVideos() {
        const container = document.getElementById('videosContent');
        if (!container) return;
        let html = `<div class="section-card"><div class="section-title">🎬 ${t('videos')}</div>`;
        studyVideos.forEach((video) => {
            html += `<div class="video-card">
                <div class="video-title">${video.title}</div>
                <div class="video-container"><iframe src="${video.url}" frameborder="0" allowfullscreen></iframe></div>
            </div>`;
        });
        html += `<p style="margin-top:15px; font-size:0.75rem;">💡 Clique no vídeo para assistir.</p></div>`;
        container.innerHTML = html;
    }

    // ======================== DICIONÁRIO ========================
    function searchDictionary() {
        const input = document.getElementById('dictSearch');
        const term = input.value.toLowerCase().trim();
        const resultDiv = document.getElementById('dictResult');
        if (!term) { resultDiv.innerHTML = '<p>🔍 Digite um termo para buscar</p>'; return; }
        const definition = bibleDictionary[term];
        if (definition) {
            resultDiv.innerHTML = `<div class="dict-term">📖 ${term.charAt(0).toUpperCase() + term.slice(1)}</div><p>${definition}</p>`;
        } else {
            resultDiv.innerHTML = `<p>⚠️ Termo não encontrado. Tente: amor, graça, fé, esperança</p>`;
        }
    }

    function renderDictionary() {
        const container = document.getElementById('dictionaryContent');
        if (!container) return;
        container.innerHTML = `<div class="dictionary-card">
            <div class="section-title">📚 ${t('dictionary')}</div>
            <div class="search-dict">
                <input type="text" id="dictSearch" placeholder="🔍 ${t('search')} termo...">
                <button class="action-btn" onclick="searchDictionary()">${t('search')}</button>
            </div>
            <div id="dictResult" class="dict-result">🔍 Digite: amor, graça, fé, esperança, perdão</div>
        </div>`;
    }

    // ======================== COMPARTILHAR ========================
    async function generateAndShareImage() {
        showToast("🎨 Gerando imagem...");
        const verseText = document.getElementById('dailyVerseText').innerText.replace(/"/g, '');
        const verseRef = document.getElementById('dailyVerseRef').innerText;
        const canvas = document.getElementById('shareCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1080; canvas.height = 1920;
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#1a3a2e'); gradient.addColorStop(1, '#2d5a46');
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FFD966'; ctx.font = 'bold 50px "Segoe UI"'; ctx.textAlign = 'center';
        ctx.fillText("📖 CONEXÃO DIVINA", canvas.width/2, 120);
        ctx.fillStyle = '#c9a87b'; ctx.font = '30px "Segoe UI"'; ctx.fillText(`Dia ${currentDay} de 365`, canvas.width/2, 210);
        ctx.fillStyle = '#F5E6D3'; ctx.font = 'italic 36px "Georgia"';
        let displayText = verseText.length > 70 ? verseText.substring(0, 70) + '...' : verseText;
        ctx.fillText(`“${displayText}”`, canvas.width/2, 380);
        ctx.font = '28px "Segoe UI"'; ctx.fillStyle = '#e8a735'; ctx.fillText(`— ${verseRef} —`, canvas.width/2, 480);
        ctx.fillStyle = '#8aae9a'; ctx.font = '22px monospace'; ctx.fillText("Conexão Divina • Bíblia Digital", canvas.width/2, canvas.height - 60);
        canvas.toBlob(async (blob) => {
            if (navigator.share) {
                try {
                    await navigator.share({ files: [new File([blob], "conexao_divina.png")] });
                    showToast("✨ Imagem compartilhada!");
                } catch(e) { fallbackDownload(blob); }
            } else { fallbackDownload(blob); }
        }, 'image/png');
    }
    
    function fallbackDownload(blob) {
        const url = URL.createObjectURL(blob); const a = document.createElement('a');
        a.href = url; a.download = `conexao_divina_${currentDay}.png`; a.click(); URL.revokeObjectURL(url);
        showToast("📸 Imagem salva!");
    }

    // ======================== RENDERIZAÇÃO ========================
    function renderSection(section) {
        const container = document.getElementById('dynamicContent');
        if (section === 'bible') {
            container.innerHTML = `<div class="bible-reader"><div class="section-title">📖 ${t('bible')}</div>
                <div class="book-selector"><select id="bookSelect" class="book-select" onchange="changeBook()">${booksOfBible.map(b => `<option ${b === currentBook ? 'selected' : ''}>${b}</option>`).join('')}</select>
                <select id="chapterSelect" class="chapter-select" onchange="changeChapter()"></select></div>
                <div class="chapter-nav"><button class="nav-chapter-btn" onclick="prevChapter()">◀ ${t('previous')}</button>
                <button class="nav-chapter-btn" onclick="nextChapter()">${t('next')} ▶</button>
                <button class="nav-chapter-btn bookmark-btn" onclick="saveBookmark()">${t('bookmark')}</button>
                <button class="nav-chapter-btn" onclick="goToBookmark()">${t('goToBookmark')}</button></div>
                <div id="bibleContent" class="bible-content">Carregando...</div></div>`;
            updateChapterSelect(); loadBibleChapter();
        } else if (section === 'guide') {
            container.innerHTML = `<div id="guideContent"></div>`; renderReadingGuide();
        } else if (section === 'videos') {
            container.innerHTML = `<div id="videosContent"></div>`; renderVideos();
        } else if (section === 'dictionary') {
            container.innerHTML = `<div id="dictionaryContent"></div>`; renderDictionary();
        } else if (section === 'audio') {
            container.innerHTML = `<div class="section-card"><div class="section-title">🎧 ${t('audio')}</div>
                <button id="audioBtn" class="action-btn" style="font-size:1rem; padding:12px;">🔊 ${t('listen')} ${t('verseOfDay')}</button></div>`;
            document.getElementById('audioBtn')?.addEventListener('click', speakVerseOfDay);
        } else if (section === 'lang') {
            const langs = Object.keys(translations);
            const langNames = { pt:"🇵🇹 Português", en:"🇬🇧 English", es:"🇪🇸 Español", fr:"🇫🇷 Français", it:"🇮🇹 Italiano", de:"🇩🇪 Deutsch", ru:"🇷🇺 Русский", zh:"🇨🇳 中文", ja:"🇯🇵 日本語", ko:"🇰🇷 한국어", ar:"🇸🇦 العربية", hi:"🇮🇳 हिन्दी", he:"🇮🇱 עברית", el:"🇬🇷 Ελληνικά", sw:"🇹🇿 Kiswahili" };
            container.innerHTML = `<div class="section-card"><div class="section-title">🌍 ${t('languages')}</div><div class="langs-grid" id="langList"></div></div>`;
            const langDiv = document.getElementById('langList');
            langs.forEach(l => {
                const btn = document.createElement('button');
                btn.className = `lang-btn ${currentLang === l ? 'active' : ''}`;
                btn.textContent = langNames[l] || l.toUpperCase();
                btn.onclick = () => { currentLang = l; updateUILanguage(); renderSection('lang'); showToast(`Idioma: ${langNames[l] || l}`); };
                langDiv.appendChild(btn);
            });
        }
    }

    function showToast(msg, duration=2500) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg; toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', duration);
    }

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }

    // ======================== INICIALIZAÇÃO ========================
    function init() {
        updateClock(); setInterval(updateClock, 1000);
        updateDailyContent();
        loadProgress();
        loadReadingGuide();
        updateUILanguage();
        
        document.getElementById('listenVerseBtn').addEventListener('click', speakVerseOfDay);
        document.getElementById('shareImageBtn').addEventListener('click', generateAndShareImage);
        document.getElementById('newVerseBtn').addEventListener('click', () => {
            const random = Math.floor(Math.random() * dailyVersesList.length);
            const verse = dailyVersesList[random];
            document.getElementById('dailyVerseText').innerHTML = `"${verse.text}"`;
            document.getElementById('dailyVerseRef').innerText = verse.ref;
            showToast("✨ Novo versículo");
        });
        
        document.getElementById('prayerToggle').addEventListener('click', () => {
            isNightMode = !isNightMode;
            document.body.classList.toggle('prayer-mode');
            const btn = document.getElementById('prayerToggle');
            if (isNightMode) {
                btn.innerHTML = "☀️";
                btn.title = "Modo Dia";
                showToast("🌙 Modo Noturno ativado");
            } else {
                btn.innerHTML = "🌙";
                btn.title = "Modo Noturno";
                showToast("☀️ Modo Dia ativado");
            }
        });
        
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderSection(btn.dataset.section);
            });
        });
        
        renderSection('bible');
        
        window.changeBook = changeBook; window.changeChapter = changeChapter; window.prevChapter = prevChapter; window.nextChapter = nextChapter;
        window.toggleGuideDay = toggleGuideDay; window.saveBookmark = saveBookmark; window.goToBookmark = goToBookmark;
        window.searchDictionary = searchDictionary;
    }
    
    init();
</script>
